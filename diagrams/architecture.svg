<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eef6ff"/>
      <stop offset="0.52" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eefdf5"/>
    </linearGradient>
    <linearGradient id="sourceGrad" x1="130" y1="225" x2="350" y2="410" gradientUnits="userSpaceOnUse">
      <stop stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="producerGrad" x1="450" y1="225" x2="670" y2="410" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ede9fe"/>
      <stop offset="1" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="brokerGrad" x1="760" y1="185" x2="1080" y2="455" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffedd5"/>
      <stop offset="1" stop-color="#fed7aa"/>
    </linearGradient>
    <linearGradient id="processorGrad" x1="1190" y1="225" x2="1410" y2="410" gradientUnits="userSpaceOnUse">
      <stop stop-color="#dcfce7"/>
      <stop offset="1" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="805" y1="610" x2="1035" y2="795" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="dashGrad" x1="450" y1="610" x2="670" y2="795" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fce7f3"/>
      <stop offset="1" stop-color="#fbcfe8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L12 7L2 12Z" fill="#334155"/>
    </marker>
    <style>
      .title { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 38px; font-weight: 800; fill: #0f172a; }
      .subtitle { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 18px; font-weight: 500; fill: #475569; }
      .lane-title { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #334155; letter-spacing: .08em; }
      .box-title { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #0f172a; }
      .box-subtitle { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #334155; }
      .text { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 15px; fill: #475569; }
      .small { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 13px; fill: #64748b; }
      .label { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 14px; font-weight: 800; fill: #1e293b; }
      .pill { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #334155; }
      .card { stroke: #cbd5e1; stroke-width: 1.6; rx: 28; filter: url(#shadow); }
      .arrow { stroke: #334155; stroke-width: 3.2; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .arrow-dashed { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-dasharray: 8 8; }
      .note { fill: #ffffff; stroke: #dbe3ef; stroke-width: 1.2; rx: 18; }
      .code { font-family: Consolas, Monaco, monospace; font-size: 14px; fill: #334155; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="42" y="36" width="1516" height="928" rx="36" fill="#ffffff" fill-opacity="0.74" stroke="#dbe3ef" stroke-width="2"/>

  <text x="80" y="94" class="title">Real-time Wikimedia Streaming Data Platform</text>
  <text x="82" y="127" class="subtitle">Live event ingestion → Kafka-compatible streaming → real-time transformation → PostgreSQL serving layer → operational dashboard</text>

  <rect x="80" y="162" width="1440" height="330" rx="26" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.6"/>
  <text x="105" y="197" class="lane-title">STREAMING INGESTION AND PROCESSING LAYER</text>

  <rect x="80" y="540" width="1440" height="300" rx="26" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.6"/>
  <text x="105" y="575" class="lane-title">SERVING, ANALYTICS AND OBSERVABILITY LAYER</text>

  <!-- Source -->
  <rect x="120" y="238" width="230" height="178" rx="28" fill="url(#sourceGrad)" class="card"/>
  <circle cx="163" cy="282" r="24" fill="#ffffff" fill-opacity="0.82"/>
  <text x="151" y="290" font-family="Arial" font-size="24" font-weight="800" fill="#2563eb">W</text>
  <text x="185" y="278" class="box-title">Wikimedia</text>
  <text x="185" y="307" class="box-subtitle">EventStreams</text>
  <text x="145" y="345" class="text">Source type: SSE stream</text>
  <text x="145" y="372" class="text">Event: recentchange</text>
  <rect x="145" y="392" width="158" height="28" rx="14" fill="#ffffff" fill-opacity="0.72"/>
  <text x="160" y="411" class="pill">Live public events</text>

  <!-- Producer -->
  <rect x="440" y="238" width="240" height="178" rx="28" fill="url(#producerGrad)" class="card"/>
  <circle cx="483" cy="282" r="24" fill="#ffffff" fill-opacity="0.82"/>
  <text x="471" y="291" font-family="Arial" font-size="24" font-weight="800" fill="#7c3aed">P</text>
  <text x="505" y="278" class="box-title">Producer</text>
  <text x="505" y="307" class="box-subtitle">Python service</text>
  <text x="465" y="345" class="text">Parse SSE payload</text>
  <text x="465" y="372" class="text">Validate JSON event</text>
  <text x="465" y="399" class="text">Publish to topic</text>

  <!-- Broker -->
  <rect x="760" y="210" width="320" height="234" rx="30" fill="url(#brokerGrad)" class="card"/>
  <circle cx="807" cy="258" r="26" fill="#ffffff" fill-opacity="0.82"/>
  <text x="794" y="268" font-family="Arial" font-size="24" font-weight="800" fill="#ea580c">K</text>
  <text x="842" y="256" class="box-title">Redpanda</text>
  <text x="842" y="286" class="box-subtitle">Kafka-compatible broker</text>
  <rect x="790" y="322" width="260" height="42" rx="16" fill="#ffffff" fill-opacity="0.76"/>
  <text x="812" y="348" class="code">wiki.recentchange.raw</text>
  <text x="790" y="392" class="text">Partitions: 6</text>
  <text x="935" y="392" class="text">Replication: 1</text>
  <text x="790" y="421" class="text">Offsets and consumer groups</text>

  <!-- Processor -->
  <rect x="1190" y="238" width="250" height="178" rx="28" fill="url(#processorGrad)" class="card"/>
  <circle cx="1233" cy="282" r="24" fill="#ffffff" fill-opacity="0.82"/>
  <text x="1220" y="291" font-family="Arial" font-size="24" font-weight="800" fill="#16a34a">S</text>
  <text x="1255" y="278" class="box-title">Stream Processor</text>
  <text x="1255" y="307" class="box-subtitle">Python consumer</text>
  <text x="1215" y="345" class="text">Normalize nested JSON</text>
  <text x="1215" y="372" class="text">Batch DB writes</text>
  <text x="1215" y="399" class="text">Commit after DB success</text>

  <!-- PostgreSQL -->
  <rect x="790" y="620" width="300" height="188" rx="28" fill="url(#dbGrad)" class="card"/>
  <circle cx="835" cy="665" r="24" fill="#ffffff" fill-opacity="0.82"/>
  <text x="823" y="674" font-family="Arial" font-size="24" font-weight="800" fill="#0284c7">D</text>
  <text x="858" y="662" class="box-title">PostgreSQL</text>
  <text x="858" y="692" class="box-subtitle">Serving database</text>
  <rect x="820" y="728" width="240" height="42" rx="16" fill="#ffffff" fill-opacity="0.78"/>
  <text x="838" y="754" class="code">fact_recent_changes</text>
  <text x="820" y="793" class="text">PK: event_id + JSONB raw_event</text>

  <!-- Dashboard -->
  <rect x="440" y="620" width="260" height="188" rx="28" fill="url(#dashGrad)" class="card"/>
  <circle cx="484" cy="665" r="24" fill="#ffffff" fill-opacity="0.82"/>
  <text x="472" y="674" font-family="Arial" font-size="24" font-weight="800" fill="#db2777">B</text>
  <text x="507" y="662" class="box-title">Streamlit</text>
  <text x="507" y="692" class="box-subtitle">Real-time dashboard</text>
  <text x="465" y="734" class="text">KPIs, trends, latest events</text>
  <text x="465" y="761" class="text">Auto refresh every few seconds</text>
  <text x="465" y="788" class="text">SQL-based analytics</text>

  <!-- Tests / Ops -->
  <rect x="120" y="640" width="230" height="136" rx="24" fill="#ffffff" stroke="#dbe3ef" stroke-width="1.4" filter="url(#shadow)"/>
  <text x="145" y="680" class="box-title">Ops &amp; Testing</text>
  <text x="145" y="714" class="text">Docker Compose logs</text>
  <text x="145" y="741" class="text">SQL validation queries</text>
  <text x="145" y="768" class="text">Unit tests for transforms</text>

  <!-- Arrows -->
  <path d="M350 327 C385 327 402 327 437 327" class="arrow"/>
  <path d="M680 327 C715 327 725 327 758 327" class="arrow"/>
  <path d="M1080 327 C1128 327 1145 327 1188 327" class="arrow"/>
  <path d="M1315 416 C1315 518 1108 535 1016 614" class="arrow"/>
  <path d="M790 714 C755 714 736 714 702 714" class="arrow"/>
  <path d="M440 714 C405 714 388 714 352 714" class="arrow-dashed"/>

  <!-- Arrow labels -->
  <rect x="370" y="296" width="55" height="26" rx="13" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="382" y="314" class="label">HTTP</text>
  <rect x="708" y="296" width="48" height="26" rx="13" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="721" y="314" class="label">JSON</text>
  <rect x="1110" y="296" width="62" height="26" rx="13" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="1124" y="314" class="label">events</text>
  <rect x="1148" y="523" width="92" height="26" rx="13" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="1161" y="541" class="label">upsert load</text>
  <rect x="723" y="684" width="54" height="26" rx="13" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="737" y="702" class="label">SQL</text>
  <rect x="365" y="684" width="56" height="26" rx="13" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="377" y="702" class="label">debug</text>

  <!-- Reliability note -->
  <rect x="80" y="875" width="1440" height="58" rx="18" fill="#0f172a" fill-opacity="0.96"/>
  <text x="110" y="911" class="label" fill="#ffffff">Reliability pattern:</text>
  <text x="252" y="911" class="subtitle" fill="#e2e8f0">at-least-once processing + idempotent PostgreSQL sink using primary key </text>
  <text x="887" y="911" class="code" fill="#bfdbfe">event_id</text>
  <text x="955" y="911" class="subtitle" fill="#e2e8f0"> to prevent duplicate rows after retry or restart</text>

  <!-- Footer badges -->
  <rect x="1120" y="80" width="112" height="34" rx="17" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="1140" y="102" class="pill">Dockerized</text>
  <rect x="1246" y="80" width="118" height="34" rx="17" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="1264" y="102" class="pill">Real-time</text>
  <rect x="1378" y="80" width="114" height="34" rx="17" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="1395" y="102" class="pill">Portfolio</text>
</svg>
